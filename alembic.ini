# Alembic configuration for Gym ERP.
# The database URL is resolved at runtime from AppConfig/AppPaths inside
# app/database/migrations/env.py, so the static URL below is intentionally unused.

[alembic]
script_location = app/database/migrations
prepend_sys_path = .
# Use OS path separators and a portable file template (UTC timestamp prefix for ordering).
path_separator = os
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Placeholder only; env.py overrides this with the resolved engine/URL.
sqlalchemy.url = sqlite+pysqlite:///

# --- Logging (used by the Alembic CLI) ---------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
